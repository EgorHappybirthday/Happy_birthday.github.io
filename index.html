<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial;
}
#main {
    display: none;
    padding: 40px;
    background: #fdf6f0;
    text-align: center;
}
.gallery img {
    width: 250px;
    margin: 10px;
    border-radius: 15px;
}
button {
    margin-top: 30px;
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    background: #ff9aa2;
    color: white;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="main">
    <h1>С Днём Рождения, Егор! 🎉</h1>
    <p>Немного воспоминаний...</p>

    <div class="gallery">
        <img src="photo1.jpg">
        <img src="photo2.jpg">
    </div>

    <a href="https://gameinvitation.com/" target="_blank">
        <button>🎮 Пограти</button>
    </a>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W, H;
let time = 0;

const TEXT = " HAPPY BIRTHDAY EGOR 💖 ";
const chars = TEXT.split("");

function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// формула серця
function heart(t){
    return {
        x: 16 * Math.pow(Math.sin(t),3),
        y: -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t))
    };
}

function draw(){
    ctx.clearRect(0,0,W,H);

    let scale = 12 + Math.sin(time*2)*2; // пульсація
    let rot = time * 0.6; // обертання

    for(let i=0;i<chars.length;i++){

        // РУХ ПО СЕРЦЮ
        let t = (i / chars.length) * Math.PI * 2 + time;

        let p = heart(t);

        let x = p.x * scale;
        let y = p.y * scale;

        // 3D ефект (перспектива)
        let z = Math.cos(t + time) * 50;
        let perspective = 300 / (300 - z);

        x *= perspective;
        y *= perspective;

        // обертання
        let rx = x * Math.cos(rot) - y * Math.sin(rot);
        let ry = x * Math.sin(rot) + y * Math.cos(rot);

        ctx.save();
        ctx.translate(W/2 + rx, H/2 + ry);

        // НЕОН
        ctx.fillStyle = "#ff7ac6";
        ctx.font = "bold 18px Arial";

        ctx.shadowColor = "#ff4db8";
        ctx.shadowBlur = 20;

        ctx.fillText(chars[i], 0, 0);

        ctx.restore();
    }

    // центральний текст
    ctx.fillStyle = "white";
    ctx.font = "bold 42px Arial";
    ctx.textAlign = "center";
    ctx.shadowBlur = 0;
    ctx.fillText("Happy Birthday 🎂", W/2, H/2);

    time += 0.03;
    requestAnimationFrame(draw);
}

draw();

// через 6 секунд
setTimeout(()=>{
    canvas.style.display = "none";
    document.getElementById("main").style.display = "block";
    document.body.style.overflow = "auto";
},6000);
</script>

</body>
</html>
