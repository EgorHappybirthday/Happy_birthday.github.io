<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🎉</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #fdf6f0;
    color: #333;
    text-align: center;
    overflow-x: hidden;
}

#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 999;
    overflow: hidden;
}

#intro h1 {
    font-size: 50px;
    color: white;
    animation: fadeIn 2s ease-in-out;
}

/* падаючі букви */
.letter {
    position: absolute;
    top: -50px;
    font-size: 20px;
    color: white;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(110vh);
    }
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

#main {
    display: none;
    padding: 40px;
}

.gallery img {
    width: 250px;
    margin: 10px;
    border-radius: 15px;
}

button {
    margin-top: 30px;
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #ff9aa2;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="intro">
    <h1>Happy Birthday 🎂</h1>
</div>

<div id="main">
    <h1>С Днём Рождения, друг! 🎉</h1>
    <p>Немного воспоминаний...</p>

    <div class="gallery">
        <img src="photo_1.jpg">
    </div>

    <p>Спасибо за все эти годы дружбы ❤️</p>

    <a href="https://gameinvitation.com/" target="_blank">
        <button>🎮 Пограти в гру</button>
    </a>
</div>

<script>

const intro = document.getElementById("intro");

for (let i = 0; i < 50; i++) {
    let span = document.createElement("span");
    span.className = "letter";
    span.innerText = "🎉";
    span.style.left = Math.random() * 100 + "vw";
    span.style.animationDuration = (2 + Math.random() * 3) + "s";
    intro.appendChild(span);
}

setTimeout(() => {
    intro.style.display = "none";
    document.getElementById("main").style.display = "block";
}, 5000);
</script>

</body>
</html>
