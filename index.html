<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial;
    color: white;
}
canvas {
    position: absolute;
    top: 0;
    left: 0;
}
#main {
    display: none;
    padding: 40px;
    background: black; 
    text-align: center;
    min-height: 100vh; 
    box-sizing: border-box;
}
#main h1 {
    color: #ff7ac6;
}
#main p {
    color: #dddddd;
}
.gallery img {
    width: 250px;
    margin: 10px;
    border-radius: 15px;
}
button {
    margin-top: 30px;
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    background: #ff7ac6;
    color: white;
    cursor: pointer;
    transition: transform 0.2s;
}
button:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<canvas id="c"></canvas>

<div id="main">
    <h1>С Днём Рождения, Егор! 🎉</h1>
    <p>Немного воспоминаний...</p>

    <div class="gallery">
        <img src="photo1.jpg" alt="Фото 1">
        <img src="photo2.jpg" alt="Фото 2">
    </div>

    <a href="https://gameinvitation.com/" target="_blank">
        <button>🎮 Пограти</button>
    </a>
</div>

<script>
// ===== BACKGROUND =====
const bgCanvas = document.getElementById("bg");
const bgCtx = bgCanvas.getContext("2d");

let W, H;
let drops = [];

const words = ["I love you", "Happy Birthday"];

function resizeAll(){
    W = window.innerWidth;
    H = window.innerHeight;

    bgCanvas.width = W;
    bgCanvas.height = H;

    canvas.width = W;
    canvas.height = H;
}
window.addEventListener("resize", resizeAll);

// Функція для створення монолітної стіни (в один ряд)
function initWall() {
    drops = [];
    const text = "Happy Birthday";
    const fontSize = 32; // Великий шрифт для стіни
    const textWidth = 260; // Орієнтовна ширина одного напису
    const cols = Math.ceil(W / textWidth) + 1; // Рахуємо скільки слів влізе в ширину екрану

    for(let i = 0; i < cols; i++) {
        drops.push({
            x: i * textWidth,
            y: -100, // Всі починають з однакової висоти над екраном
            speed: 15, // Дуже висока швидкість для "падіння стіни"
            text: text,
            size: fontSize
        });
    }
}

// Функція для випадкових повільних слів
function initDrops(count, minSpeed, maxSpeed){
    drops = [];
    for(let i = 0; i < count; i++){
        drops.push({
            x: Math.random() * W,
            y: Math.random() * -H * 1.5, // Розкидані по висоті
            speed: minSpeed + Math.random() * maxSpeed, // Різна швидкість
            text: words[Math.floor(Math.random() * words.length)],
            size: 14 + Math.random() * 10
        });
    }
}

// ===== HEART =====
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let time = 0;
const TEXT = " HAPPY BIRTHDAY EGOR 💖 ";
const chars = TEXT.split("");

function heart(t){
    return {
        x: 16 * Math.pow(Math.sin(t), 3),
        y: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
    };
}

function drawHeart(){
    ctx.clearRect(0,0,W,H);

    let scale = 12 + Math.sin(time*2)*2;
    let rot = time * 0.25; 

    for(let i=0;i<chars.length;i++){
        let t = (i / chars.length) * Math.PI * 2 + time;
        let p = heart(t);

        let x = p.x * scale;
        let y = p.y * scale;

        let z = Math.cos(t + time) * 50;
        let perspective = 300 / (300 - z);

        x *= perspective;
        y *= perspective;

        let rx = x * Math.cos(rot) - y * Math.sin(rot);
        let ry = x * Math.sin(rot) + y * Math.cos(rot);

        ctx.save();
        ctx.translate(W/2 + rx, H/2 + ry);

        ctx.fillStyle = "#ff7ac6";
        ctx.font = "bold 18px Arial";
        ctx.shadowBlur = 0;
        ctx.fillText(chars[i], 0, 0);
        ctx.restore();
    }

    ctx.fillStyle = "white";
    ctx.font = "bold 42px Arial";
    ctx.textAlign = "center";
    ctx.shadowBlur = 0;
    ctx.fillText("Happy Birthday 🎂", W/2, H/2);
}

// ===== ЛОГІКА АНІМАЦІЇ (ФАЗИ) =====
let stage = 0;
let startTime = Date.now();
const trailCount = 6; // Кількість копій для шлейфу

resizeAll();

function animate(){
    let elapsed = Date.now() - startTime;

    // Таймінг подій:
    if(stage === 0) {
        initWall(); // Створюємо стіну
        stage = 1;
    } else if (stage === 1 && elapsed > 2500) {
        // 2.5 секунди стіна пролітає і зникає, робимо паузу
        drops = []; // Очищаємо масив, щоб екран був пустий
        stage = 2;
    } else if (stage === 2 && elapsed > 3500) {
        // На 3.5 секунді запускаємо серце і повільні слова
        initDrops(50, 1, 2.5);
        stage = 3;
    }

    // Чистий чорний фон
    bgCtx.fillStyle = "black";
    bgCtx.fillRect(0,0,W,H);

    drops.forEach(d => {
        bgCtx.font = "bold " + d.size + "px Arial";
        
        for(let j = trailCount; j >= 0; j--) {
            let alpha = 1 - (j / trailCount); 
            if(alpha <= 0) continue;

            bgCtx.fillStyle = `rgba(255, 110, 199, ${alpha})`;
            let ghostY = d.y - (j * d.size * 1.5); 
            
            bgCtx.fillText(d.text, d.x, ghostY);
        }

        d.y += d.speed;

        let topGhostY = d.y - (trailCount * d.size * 1.5);

        // Якщо слово і його шлейф повністю зникли внизу
        if(topGhostY > H){
            if(stage >= 3) {
                // Тільки на 3 стадії слова повертаються нагору (нескінченний дощ)
                d.y = -50 - (Math.random() * 200);
                d.x = Math.random() * W;
            }
        }
    });

    // Серце малюємо тільки коли падає "дощ" зі слів (стадія 3)
    if (stage === 3) {
        drawHeart();
    }

    time += 0.03;

    if(elapsed < 12000) {
        requestAnimationFrame(animate);
    }
}

animate();

// ===== ПЕРЕХІД НА САЙТ =====
setTimeout(() => {
    bgCanvas.style.display = "none";
    canvas.style.display = "none";
    
    const mainDiv = document.getElementById("main");
    mainDiv.style.display = "block";
    
    mainDiv.style.opacity = 0;
    let op = 0;
    let fadeInterval = setInterval(() => {
        if(op >= 1) clearInterval(fadeInterval);
        mainDiv.style.opacity = op;
        op += 0.05;
    }, 50);

    document.body.style.overflow = "auto";
}, 12000);
</script>

</body>
</html>
