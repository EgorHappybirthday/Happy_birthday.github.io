<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🎉</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #fdf6f0;
    text-align: center;
    overflow: hidden;
}

/* --- INTRO --- */
#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    z-index: 999;
}

/* --- MAIN SITE --- */
#main {
    display: none;
    padding: 40px;
    background: #fdf6f0;
}

.gallery img {
    width: 250px;
    margin: 10px;
    border-radius: 15px;
}

button {
    margin-top: 30px;
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #ff9aa2;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <canvas id="c"></canvas>
</div>

<!-- MAIN -->
<div id="main">
    <h1>С Днём Рождения, Егор! 🎉</h1>
    <p>Немного воспоминаний...</p>

    <div class="gallery">
        <img src="photo1.jpg">
        <img src="photo2.jpg">
    </div>

    <p>Спасибо за все эти годы дружбы ❤️</p>

    <a href="https://gameinvitation.com/" target="_blank">
        <button>🎮 Пограти в гру</button>
    </a>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W, H;
const text = "Happy Birthday Egor";
const points = [];
const TOTAL = 120;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    buildPoints();
}
window.addEventListener("resize", resize);

function heart(t) {
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = 13 * Math.cos(t) - 5 * Math.cos(2*t)
            - 2 * Math.cos(3*t) - Math.cos(4*t);
    return { x: x * 15, y: -y * 15 };
}

function buildPoints() {
    points.length = 0;
    for (let i = 0; i < TOTAL; i++) {
        const t = (i / TOTAL) * Math.PI * 2;
        points.push({ t });
    }
}

function draw() {
    ctx.clearRect(0, 0, W, H);

    points.forEach(p => {
        const pos = heart(p.t);

        ctx.save();
        ctx.translate(W/2 + pos.x, H/2 + pos.y);

        ctx.fillStyle = "pink";
        ctx.font = "14px Arial";
        ctx.shadowColor = "pink";
        ctx.shadowBlur = 10;

        ctx.fillText(text, 0, 0);

        ctx.restore();
    });

    // центральний текст
    ctx.fillStyle = "white";
    ctx.font = "bold 40px Arial";
    ctx.textAlign = "center";
    ctx.fillText("Happy Birthday 🎂", W/2, H/2);

    requestAnimationFrame(draw);
}

resize();
draw();

// через 6 секунд показуємо сайт
setTimeout(() => {
    document.getElementById("intro").style.display = "none";
    document.getElementById("main").style.display = "block";
    document.body.style.overflow = "auto";
}, 6000);
</script>

</body>
</html>
