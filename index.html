<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🎉</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial;
}

#main {
    display: none;
    padding: 40px;
    background: #fdf6f0;
    text-align: center;
}

.gallery img {
    width: 250px;
    margin: 10px;
    border-radius: 15px;
}

button {
    margin-top: 30px;
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #ff9aa2;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="main">
    <h1>С Днём Рождения, Егор! 🎉</h1>
    <p>Немного воспоминаний...</p>

    <div class="gallery">
        <img src="photo1.jpg">
        <img src="photo2.jpg">
    </div>

    <p>Спасибо за все эти годы дружбы ❤️</p>

    <a href="https://gameinvitation.com/" target="_blank">
        <button>🎮 Пограти в гру</button>
    </a>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W, H;
const text = "Happy Birthday Egor";
const TOTAL = 150;
let time = 0;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// серце
function heart(t) {
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = 13 * Math.cos(t) - 5 * Math.cos(2*t)
            - 2 * Math.cos(3*t) - Math.cos(4*t);
    return { x, y };
}

function draw() {
    ctx.clearRect(0, 0, W, H);

    let scale = 12 + Math.sin(time * 2) * 2; // пульсація
    let rotation = time * 0.5; // обертання

    for (let i = 0; i < TOTAL; i++) {
        let t = (i / TOTAL) * Math.PI * 2 + time;

        let pos = heart(t);

        // псевдо 3D обертання
        let x = pos.x * scale;
        let y = pos.y * scale;

        let rotatedX = x * Math.cos(rotation) - y * Math.sin(rotation);
        let rotatedY = x * Math.sin(rotation) + y * Math.cos(rotation);

        ctx.save();
        ctx.translate(W/2 + rotatedX, H/2 + rotatedY);

        ctx.fillStyle = "pink";
        ctx.font = "14px Arial";
        ctx.shadowColor = "pink";
        ctx.shadowBlur = 15;

        ctx.fillText(text, 0, 0);

        ctx.restore();
    }

    // центр
    ctx.fillStyle = "white";
    ctx.font = "bold 42px Arial";
    ctx.textAlign = "center";
    ctx.fillText("Happy Birthday 🎂", W/2, H/2);

    time += 0.02;
    requestAnimationFrame(draw);
}

draw();

// через 6 сек показуємо сайт
setTimeout(() => {
    canvas.style.display = "none";
    document.getElementById("main").style.display = "block";
    document.body.style.overflow = "auto";
}, 6000);
</script>

</body>
</html>
