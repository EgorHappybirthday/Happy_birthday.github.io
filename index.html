<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Happy Birthday</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
    touch-action: none;
}

/* СТАРТОВИЙ ЕКРАН */
#start-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
}
#start-btn {
    padding: 20px 40px;
    font-size: 24px;
    border-radius: 15px;
    border: none;
    background: #ff7ac6;
    color: white;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.2s, background 0.2s;
    box-shadow: 0 0 20px rgba(255, 122, 198, 0.5);
}
#start-btn:hover {
    transform: scale(1.05);
    background: #ff4db8;
}

/* ЕКРАН ДЛЯ МИГАННЯ */
#flash-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    z-index: 50; /* Нижче за старт, але вище за канвас */
    display: none;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
}

#click-hint {
    position: absolute;
    bottom: 40px;
    width: 100%;
    text-align: center;
    color: #ffffff;
    font-size: 18px;
    z-index: 10;
    opacity: 0;
    transition: opacity 1s;
    pointer-events: none;
    animation: pulse 1.5s infinite;
}
@keyframes pulse {
    0% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.05); opacity: 1; }
    100% { transform: scale(1); opacity: 0.5; }
}

#main {
    display: none;
    padding: 40px 20px;
    background: black; 
    text-align: center;
    min-height: 100vh; 
    box-sizing: border-box;
    position: relative;
    z-index: 20;
}
#main h1 { color: #ff7ac6; }
#main p { color: #dddddd; }
.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
}
.gallery img {
    width: 100%;
    max-width: 300px;
    border-radius: 15px;
}
.main-btn {
    margin-top: 40px;
    padding: 15px 30px;
    font-size: 20px;
    border-radius: 10px;
    border: none;
    background: #ff7ac6;
    color: white;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.2s;
}
.main-btn:hover { transform: scale(1.05); }
</style>
</head>

<body>

<div id="start-screen">
    <button id="start-btn">Відкрити подарунок 🎁</button>
</div>
<div id="flash-overlay"></div>

<div id="click-hint">Натисни на екран 🎁</div>
<canvas id="bg"></canvas>
<canvas id="c"></canvas>

<div id="main">
    <h1>С Днём Рождения, Егор! 🎉</h1>
    <p>Немного воспоминаний...</p>
    <div class="gallery">
        <img src="photo1.jpg" alt="Фото 1">
        <img src="photo2.jpg" alt="Фото 2">
    </div>
    <a href="https://gameinvitation.com/" target="_blank">
        <button class="main-btn">🎮 Пограти</button>
    </a>
</div>

<script>
// ===== WEB AUDIO API: ГЕНЕРАТОР БІЛОГО ШУМУ =====
let audioCtx;
let noiseSource;
let gainNode;

function startWhiteNoise() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // Створюємо буфер на 2 секунди
    const bufferSize = audioCtx.sampleRate * 2; 
    const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const output = noiseBuffer.getChannelData(0);
    
    // Заповнюємо буфер випадковими значеннями (це і є білий шум)
    for (let i = 0; i < bufferSize; i++) {
        output[i] = Math.random() * 2 - 1;
    }

    noiseSource = audioCtx.createBufferSource();
    noiseSource.buffer = noiseBuffer;
    noiseSource.loop = true; // Зациклюємо

    // Контролер гучності
    gainNode = audioCtx.createGain();
    gainNode.gain.value = 0.5; // Гучність 50%

    noiseSource.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    noiseSource.start();
}

function stopWhiteNoise() {
    if (gainNode) {
        // Плавне затухання звуку за 1 секунду
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);
        setTimeout(() => { if (noiseSource) noiseSource.stop(); }, 1000);
    }
}

// ===== ПОСЛІДОВНІСТЬ ВСТУПУ (МИГАННЯ) =====
document.getElementById('start-btn').addEventListener('click', () => {
    // Ховаємо кнопку
    document.getElementById('start-screen').style.display = 'none';
    
    const flashOverlay = document.getElementById('flash-overlay');
    flashOverlay.style.display = 'block';

    // Запускаємо швидке мигання
    let isWhite = false;
    const flashInterval = setInterval(() => {
        isWhite = !isWhite;
        flashOverlay.style.backgroundColor = isWhite ? 'white' : 'black';
    }, 40); // Швидкість мигання (40мс - дуже різко)

    // Через 2 секунди після старту мигання вмикаємо шум
    setTimeout(() => {
        startWhiteNoise();
    }, 2000);

    // Через 4 секунди після старту зупиняємо мигання і запускаємо анімацію стіни
    setTimeout(() => {
        clearInterval(flashInterval);
        flashOverlay.style.display = 'none'; // Ховаємо шар мигання
        
        // Запускаємо основну анімацію
        startTime = Date.now();
        animId = requestAnimationFrame(animate);
    }, 4000);
});

// ===== BACKGROUND =====
const bgCanvas = document.getElementById("bg");
const bgCtx = bgCanvas.getContext("2d");

let W, H;
let drops = [];

const words = ["I love you", "Happy Birthday", "Egorka", "Happy B-Day"];

function resizeAll(){
    W = window.innerWidth;
    H = window.innerHeight;
    bgCanvas.width = W;
    bgCanvas.height = H;
    canvas.width = W;
    canvas.height = H;
}
window.addEventListener("resize", resizeAll);

function initWall() {
    drops = [];
    const text = "Happy Birthday";
    const fontSize = 24; 
    const textWidth = 190;
    const textHeight = fontSize * 2;
    
    const cols = Math.ceil(W / textWidth) + 1; 
    const rows = Math.ceil(H / textHeight) + 3;

    let startY = -(rows * textHeight) - 100;

    for(let i = 0; i < cols; i++) {
        for(let j = 0; j < rows; j++) {
            drops.push({
                x: i * textWidth,
                y: startY + (j * textHeight), 
                speed: 30,
                text: text,
                size: fontSize
            });
        }
    }
}

function initDrops(count, minSpeed, maxSpeed){
    drops = [];
    for(let i = 0; i < count; i++){
        drops.push({
            x: Math.random() * W,
            y: Math.random() * -H * 1.5,
            speed: minSpeed + Math.random() * maxSpeed,
            text: words[Math.floor(Math.random() * words.length)],
            size: 14 + Math.random() * 12
        });
    }
}

// ===== HEART =====
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let time = 0;
const TEXT = " HAPPY BIRTHDAY EGOR 💖 ";
const chars = TEXT.split("");

function heart(t){
    return {
        x: 16 * Math.pow(Math.sin(t), 3),
        y: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
    };
}

function drawHeart(){
    ctx.clearRect(0,0,W,H);

    let scale = Math.min(W, H) / 45;
    scale = scale + Math.sin(time*2)*1.5;
    let rot = time * 0.25; 

    for(let i=0;i<chars.length;i++){
        let t = (i / chars.length) * Math.PI * 2 + time;
        let p = heart(t);
        let x = p.x * scale;
        let y = p.y * scale;
        let z = Math.cos(t + time) * 50;
        let perspective = 300 / (300 - z);
        x *= perspective;
        y *= perspective;

        let rx = x * Math.cos(rot) - y * Math.sin(rot);
        let ry = x * Math.sin(rot) + y * Math.cos(rot);

        ctx.save();
        ctx.translate(W/2 + rx, H/2 + ry - 30);
        ctx.fillStyle = "#ff7ac6";
        ctx.font = "bold 18px Arial";
        ctx.shadowBlur = 0;
        ctx.fillText(chars[i], 0, 0);
        ctx.restore();
    }

    ctx.fillStyle = "white";
    let fontSize = Math.min(W / 10, 42); 
    ctx.font = "bold " + fontSize + "px Arial";
    ctx.textAlign = "center";
    ctx.shadowBlur = 0;
    ctx.fillText("Happy Birthday 🎂", W/2, H/2 - 30);
}

// ===== ЛОГІКА АНІМАЦІЇ =====
let stage = 0;
let startTime;
const trailCount = 5;
let animId;

resizeAll();

function animate(){
    let elapsed = Date.now() - startTime;

    if(stage === 0) {
        initWall();
        stage = 1;
    } else if (stage === 1 && elapsed > 2000) {
        drops = []; 
        stage = 2;
    } else if (stage === 2 && elapsed > 2500) {
        initDrops(60, 3, 7);
        document.getElementById("click-hint").style.opacity = 1;
        stage = 3;
    }

    bgCtx.fillStyle = "black";
    bgCtx.fillRect(0,0,W,H);

    drops.forEach(d => {
        bgCtx.font = "bold " + d.size + "px Arial";
        for(let j = trailCount; j >= 0; j--) {
            let alpha = 1 - (j / trailCount); 
            if(alpha <= 0) continue;
            bgCtx.fillStyle = `rgba(255, 110, 199, ${alpha})`;
            let ghostY = d.y - (j * d.size * 1.5); 
            bgCtx.fillText(d.text, d.x, ghostY);
        }
        d.y += d.speed;
        let topGhostY = d.y - (trailCount * d.size * 1.5);
        if(topGhostY > H && stage === 3){
            d.y = -50 - (Math.random() * 100);
            d.x = Math.random() * W;
        }
    });

    if (stage === 3) {
        drawHeart();
    }

    time += 0.03;
    animId = requestAnimationFrame(animate);
}

// ===== ПЕРЕХІД НА САЙТ ЗА КЛІКОМ =====
let introActive = true;

function endIntro(e) {
    // Ігноруємо кліки по стартовій кнопці
    if(e.target.id === 'start-btn') return;
    
    // Не даємо перейти далі, поки не пролетить стіна
    if (!introActive || stage < 2) return; 
    
    introActive = false;

    // Зупиняємо анімацію та шум
    cancelAnimationFrame(animId);
    stopWhiteNoise();

    bgCanvas.style.display = "none";
    canvas.style.display = "none";
    document.getElementById("click-hint").style.display = "none";
    
    const mainDiv = document.getElementById("main");
    mainDiv.style.display = "block";
    
    mainDiv.style.opacity = 0;
    let op = 0;
    let fadeInterval = setInterval(() => {
        if(op >= 1) clearInterval(fadeInterval);
        mainDiv.style.opacity = op;
        op += 0.08;
    }, 30);

    document.body.style.overflow = "auto";
    document.body.style.touchAction = "auto";
}

window.addEventListener("click", endIntro);
window.addEventListener("touchstart", endIntro);

</script>
</body>
</html>
