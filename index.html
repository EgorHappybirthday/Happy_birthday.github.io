<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Happy Birthday</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden; /* Забороняємо скрол під час інтро */
    font-family: Arial, sans-serif;
    color: white;
    touch-action: none; /* Запобігає випадковим зумам на телефоні */
}
canvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
}
/* Щоб підказка про клік була поверх канвасів */
#click-hint {
    position: absolute;
    bottom: 40px;
    width: 100%;
    text-align: center;
    color: #ffffff;
    font-size: 18px;
    z-index: 10;
    opacity: 0;
    transition: opacity 1s;
    pointer-events: none; /* Щоб клік проходив крізь напис на канвас */
    animation: pulse 1.5s infinite;
}
@keyframes pulse {
    0% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.05); opacity: 1; }
    100% { transform: scale(1); opacity: 0.5; }
}

#main {
    display: none;
    padding: 40px 20px;
    background: black; 
    text-align: center;
    min-height: 100vh; 
    box-sizing: border-box;
    position: relative;
    z-index: 20;
}
#main h1 {
    color: #ff7ac6;
}
#main p {
    color: #dddddd;
}
.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
}
.gallery img {
    width: 100%;
    max-width: 300px;
    border-radius: 15px;
}
button {
    margin-top: 40px;
    padding: 15px 30px;
    font-size: 20px;
    border-radius: 10px;
    border: none;
    background: #ff7ac6;
    color: white;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.2s, background 0.2s;
}
button:hover {
    transform: scale(1.05);
    background: #ff4db8;
}
</style>
</head>

<body>

<div id="click-hint">Натисни на екран 🎁</div>

<canvas id="bg"></canvas>
<canvas id="c"></canvas>

<div id="main">
    <h1>С Днём Рождения, Егор! 🎉</h1>
    <p>Немного воспоминаний...</p>

    <div class="gallery">
        <img src="photo1.jpg" alt="Фото 1">
        <img src="photo2.jpg" alt="Фото 2">
    </div>

    <a href="https://gameinvitation.com/" target="_blank">
        <button>🎮 Пограти</button>
    </a>
</div>

<script>
// ===== BACKGROUND =====
const bgCanvas = document.getElementById("bg");
const bgCtx = bgCanvas.getContext("2d");

let W, H;
let drops = [];

const words = ["I love you", "Happy Birthday", "Egorka", "Happy B-Day"];

function resizeAll(){
    W = window.innerWidth;
    H = window.innerHeight;

    bgCanvas.width = W;
    bgCanvas.height = H;

    canvas.width = W;
    canvas.height = H;
}
window.addEventListener("resize", resizeAll);

// Функція для створення СПРАВЖНЬОЇ стіни (сіткою)
function initWall() {
    drops = [];
    const text = "Happy Birthday";
    const fontSize = 24; 
    const textWidth = 190; // Приблизна ширина слова
    const textHeight = fontSize * 2; // Висота рядка
    
    // Рахуємо скільки треба колонок і рядків, щоб закрити весь екран
    const cols = Math.ceil(W / textWidth) + 1; 
    const rows = Math.ceil(H / textHeight) + 3; // +3 для запасу

    // Генеруємо блок, який спочатку знаходиться повністю ВИЩЕ екрану
    let startY = -(rows * textHeight) - 100;

    for(let i = 0; i < cols; i++) {
        for(let j = 0; j < rows; j++) {
            drops.push({
                x: i * textWidth,
                y: startY + (j * textHeight), 
                speed: 30, // Стіна падає ДУЖЕ швидко
                text: text,
                size: fontSize
            });
        }
    }
}

// Функція для швидких крапель-написів
function initDrops(count, minSpeed, maxSpeed){
    drops = [];
    for(let i = 0; i < count; i++){
        drops.push({
            x: Math.random() * W,
            y: Math.random() * -H * 1.5,
            speed: minSpeed + Math.random() * maxSpeed, // Швидкість тепер буде вищою
            text: words[Math.floor(Math.random() * words.length)],
            size: 14 + Math.random() * 12
        });
    }
}

// ===== HEART =====
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let time = 0;
const TEXT = " HAPPY BIRTHDAY EGOR 💖 ";
const chars = TEXT.split("");

function heart(t){
    return {
        x: 16 * Math.pow(Math.sin(t), 3),
        y: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
    };
}

function drawHeart(){
    ctx.clearRect(0,0,W,H);

    let scale = Math.min(W, H) / 45; // Адаптивний розмір серця під екрани телефонів
    scale = scale + Math.sin(time*2)*1.5; // Пульсація
    
    let rot = time * 0.25; 

    for(let i=0;i<chars.length;i++){
        let t = (i / chars.length) * Math.PI * 2 + time;
        let p = heart(t);

        let x = p.x * scale;
        let y = p.y * scale;

        let z = Math.cos(t + time) * 50;
        let perspective = 300 / (300 - z);

        x *= perspective;
        y *= perspective;

        let rx = x * Math.cos(rot) - y * Math.sin(rot);
        let ry = x * Math.sin(rot) + y * Math.cos(rot);

        ctx.save();
        ctx.translate(W/2 + rx, H/2 + ry - 30); // Трохи підняв, щоб звільнити місце для тексту внизу

        ctx.fillStyle = "#ff7ac6";
        ctx.font = "bold 18px Arial";
        ctx.shadowBlur = 0;
        ctx.fillText(chars[i], 0, 0);
        ctx.restore();
    }

    ctx.fillStyle = "white";
    // Розмір центрального тексту теж адаптуємо
    let fontSize = Math.min(W / 10, 42); 
    ctx.font = "bold " + fontSize + "px Arial";
    ctx.textAlign = "center";
    ctx.shadowBlur = 0;
    ctx.fillText("Happy Birthday 🎂", W/2, H/2 - 30);
}

// ===== ЛОГІКА АНІМАЦІЇ =====
let stage = 0;
let startTime = Date.now();
const trailCount = 5; // Довжина шлейфу
let animId; // Змінна для зупинки анімації

resizeAll();

function animate(){
    let elapsed = Date.now() - startTime;

    // Таймінг подій
    if(stage === 0) {
        initWall(); // Стіна
        stage = 1;
    } else if (stage === 1 && elapsed > 2000) {
        // Стіна пролетіла
        drops = []; 
        stage = 2;
    } else if (stage === 2 && elapsed > 2500) {
        // Серце і дощ
        // Швидкість збільшено (від 3 до 7), щоб на телефоні встигало падати
        initDrops(60, 3, 7);
        
        // Показуємо підказку "Натисни на екран"
        document.getElementById("click-hint").style.opacity = 1;
        
        stage = 3;
    }

    // Чистий чорний фон
    bgCtx.fillStyle = "black";
    bgCtx.fillRect(0,0,W,H);

    drops.forEach(d => {
        bgCtx.font = "bold " + d.size + "px Arial";
        
        for(let j = trailCount; j >= 0; j--) {
            let alpha = 1 - (j / trailCount); 
            if(alpha <= 0) continue;

            bgCtx.fillStyle = `rgba(255, 110, 199, ${alpha})`;
            let ghostY = d.y - (j * d.size * 1.5); 
            
            bgCtx.fillText(d.text, d.x, ghostY);
        }

        d.y += d.speed;

        let topGhostY = d.y - (trailCount * d.size * 1.5);

        if(topGhostY > H){
            if(stage === 3) {
                d.y = -50 - (Math.random() * 100);
                d.x = Math.random() * W;
            }
        }
    });

    if (stage === 3) {
        drawHeart();
    }

    time += 0.03;
    animId = requestAnimationFrame(animate);
}

// Запускаємо анімацію
animId = requestAnimationFrame(animate);

// ===== ПЕРЕХІД НА САЙТ ЗА КЛІКОМ =====
let introActive = true;

function endIntro() {
    if (!introActive || stage < 2) return; // Не даємо клікнути, поки стіна не впала
    introActive = false;

    // Зупиняємо анімацію
    cancelAnimationFrame(animId);

    // Ховаємо інтро
    bgCanvas.style.display = "none";
    canvas.style.display = "none";
    document.getElementById("click-hint").style.display = "none";
    
    // Показуємо основний сайт
    const mainDiv = document.getElementById("main");
    mainDiv.style.display = "block";
    
    // Плавна поява
    mainDiv.style.opacity = 0;
    let op = 0;
    let fadeInterval = setInterval(() => {
        if(op >= 1) clearInterval(fadeInterval);
        mainDiv.style.opacity = op;
        op += 0.08;
    }, 30);

    // Дозволяємо скролити сайт
    document.body.style.overflow = "auto";
    document.body.style.touchAction = "auto";
}

// Слухаємо клік мишкою або тап по екрану телефону
window.addEventListener("click", endIntro);
window.addEventListener("touchstart", endIntro);

</script>

</body>
</html>
