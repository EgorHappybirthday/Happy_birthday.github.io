<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial;
}
canvas {
    position: absolute;
    top: 0;
    left: 0;
}
#main {
    display: none;
    padding: 40px;
    background: #fdf6f0;
    text-align: center;
}
.gallery img {
    width: 250px;
    margin: 10px;
    border-radius: 15px;
}
button {
    margin-top: 30px;
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    background: #ff9aa2;
    color: white;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<canvas id="c"></canvas>

<div id="main">
    <h1>С Днём Рождения, Егор! 🎉</h1>
    <p>Немного воспоминаний...</p>

    <div class="gallery">
        <img src="photo1.jpg">
        <img src="photo2.jpg">
    </div>

    <a href="https://gameinvitation.com/" target="_blank">
        <button>🎮 Пограти</button>
    </a>
</div>

<script>
// ===== BACKGROUND =====
const bgCanvas = document.getElementById("bg");
const bgCtx = bgCanvas.getContext("2d");

let W, H;
let drops = [];

const words = ["I love you", "Happy Birthday"];

function resizeAll(){
    W = window.innerWidth;
    H = window.innerHeight;

    bgCanvas.width = W;
    bgCanvas.height = H;

    canvas.width = W;
    canvas.height = H;

    initDrops();
}
window.addEventListener("resize", resizeAll);

function initDrops(){
    drops = [];
    for(let i=0;i<110;i++){
        drops.push({
            x: Math.random()*W,
            y: Math.random()*-H,
            speed: 0.5 + Math.random()*1.5,
            text: words[Math.floor(Math.random()*words.length)],
            size: 10 + Math.random()*10
        });
    }
}

function drawBG(){
    // ШЛЕЙФ
    bgCtx.fillStyle = "rgba(0,0,0,0.15)";
    bgCtx.fillRect(0,0,W,H);

    drops.forEach(d=>{
        bgCtx.fillStyle = "#ff6ec7";
        bgCtx.font = d.size + "px Arial";

        bgCtx.shadowColor = "#ff6ec7";
        bgCtx.shadowBlur = 10;

        bgCtx.fillText(d.text, d.x, d.y);

        d.y += d.speed;

        if(d.y > H){
            d.y = -20;
            d.x = Math.random()*W;
        }
    });
}

// ===== HEART =====
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let time = 0;

const TEXT = " HAPPY BIRTHDAY EGOR 💖 ";
const chars = TEXT.split("");

function heart(t){
    return {
        x: 16 * Math.pow(Math.sin(t),3),
        y: -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t))
    };
}

function drawHeart(){
    ctx.clearRect(0,0,W,H);

    let scale = 12 + Math.sin(time*2)*2;
    let rot = time * 0.25; // повільніше

    for(let i=0;i<chars.length;i++){

        let t = (i / chars.length) * Math.PI * 2 + time;

        let p = heart(t);

        let x = p.x * scale;
        let y = p.y * scale;

        let z = Math.cos(t + time) * 50;
        let perspective = 300 / (300 - z);

        x *= perspective;
        y *= perspective;

        let rx = x * Math.cos(rot) - y * Math.sin(rot);
        let ry = x * Math.sin(rot) + y * Math.cos(rot);

        ctx.save();
        ctx.translate(W/2 + rx, H/2 + ry);

        ctx.fillStyle = "#ff7ac6";
        ctx.font = "bold 18px Arial";

        ctx.shadowColor = "#ff4db8";
        ctx.shadowBlur = 20;

        ctx.fillText(chars[i], 0, 0);

        ctx.restore();
    }

    // центральний текст
    ctx.fillStyle = "white";
    ctx.font = "bold 42px Arial";
    ctx.textAlign = "center";
    ctx.shadowBlur = 0;
    ctx.fillText("Happy Birthday 🎂", W/2, H/2);
}

// ===== LOOP =====
function animate(){
    drawBG();
    drawHeart();

    time += 0.03;
    requestAnimationFrame(animate);
}

resizeAll();
animate();

// ===== ПЕРЕХІД =====
setTimeout(()=>{
    bgCanvas.style.display = "none";
    canvas.style.display = "none";
    document.getElementById("main").style.display = "block";
    document.body.style.overflow = "auto";
},8000);
</script>

</body>
</html>
