<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>

<style>
body {
    margin: 0;
    background: black; /* Фон завжди чорний */
    overflow: hidden;
    font-family: Arial;
    color: white;
}
canvas {
    position: absolute;
    top: 0;
    left: 0;
}
#main {
    display: none;
    padding: 40px;
    background: black; /* Чорний фон для основного сайту */
    text-align: center;
    min-height: 100vh; 
    box-sizing: border-box;
}
#main h1 {
    color: #ff7ac6;
}
#main p {
    color: #dddddd;
}
.gallery img {
    width: 250px;
    margin: 10px;
    border-radius: 15px;
}
button {
    margin-top: 30px;
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    background: #ff7ac6;
    color: white;
    cursor: pointer;
    transition: transform 0.2s;
}
button:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<canvas id="c"></canvas>

<div id="main">
    <h1>С Днём Рождения, Егор! 🎉</h1>
    <p>Немного воспоминаний...</p>

    <div class="gallery">
        <img src="photo1.jpg" alt="Фото 1">
        <img src="photo2.jpg" alt="Фото 2">
    </div>

    <a href="https://gameinvitation.com/" target="_blank">
        <button>🎮 Пограти</button>
    </a>
</div>

<script>
// ===== BACKGROUND =====
const bgCanvas = document.getElementById("bg");
const bgCtx = bgCanvas.getContext("2d");

let W, H;
let drops = [];

const words = ["I love you", "Happy Birthday"];

function resizeAll(){
    W = window.innerWidth;
    H = window.innerHeight;

    bgCanvas.width = W;
    bgCanvas.height = H;

    canvas.width = W;
    canvas.height = H;
}
window.addEventListener("resize", resizeAll);

function initDrops(count, minSpeed, maxSpeed, onlyHB = false){
    drops = [];
    for(let i = 0; i < count; i++){
        let textOpt = onlyHB ? "Happy Birthday" : words[Math.floor(Math.random() * words.length)];
        drops.push({
            x: Math.random() * W,
            y: Math.random() * -H * 1.5,
            speed: minSpeed + Math.random() * maxSpeed,
            text: textOpt,
            size: 12 + Math.random() * 10
        });
    }
}

// ===== HEART =====
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let time = 0;
const TEXT = " HAPPY BIRTHDAY EGOR 💖 ";
const chars = TEXT.split("");

function heart(t){
    return {
        x: 16 * Math.pow(Math.sin(t), 3),
        y: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
    };
}

function drawHeart(){
    ctx.clearRect(0,0,W,H);

    let scale = 12 + Math.sin(time*2)*2;
    let rot = time * 0.25; 

    for(let i=0;i<chars.length;i++){
        let t = (i / chars.length) * Math.PI * 2 + time;
        let p = heart(t);

        let x = p.x * scale;
        let y = p.y * scale;

        let z = Math.cos(t + time) * 50;
        let perspective = 300 / (300 - z);

        x *= perspective;
        y *= perspective;

        let rx = x * Math.cos(rot) - y * Math.sin(rot);
        let ry = x * Math.sin(rot) + y * Math.cos(rot);

        ctx.save();
        ctx.translate(W/2 + rx, H/2 + ry);

        ctx.fillStyle = "#ff7ac6";
        ctx.font = "bold 18px Arial";
        ctx.shadowBlur = 0; // Прибрали світіння і тут, щоб стиль був єдиним
        ctx.fillText(chars[i], 0, 0);
        ctx.restore();
    }

    ctx.fillStyle = "white";
    ctx.font = "bold 42px Arial";
    ctx.textAlign = "center";
    ctx.shadowBlur = 0;
    ctx.fillText("Happy Birthday 🎂", W/2, H/2);
}

// ===== ЛОГІКА АНІМАЦІЇ (ФАЗИ) =====
let stage = 0;
let startTime = Date.now();
const trailCount = 5; // Кількість "привидів" позаду слова

resizeAll();

function animate(){
    let elapsed = Date.now() - startTime;

    if(stage === 0) {
        initDrops(70, 2, 4.5, true); 
        stage = 1;
    } else if (stage === 1 && elapsed > 4500) {
        stage = 2;
    } else if (stage === 2 && elapsed > 6500) {
        initDrops(50, 0.5, 2, false);
        stage = 3;
    }

    // Тепер фон просто жорстко чорний, ніякого "брудного" шлейфу
    bgCtx.fillStyle = "black";
    bgCtx.fillRect(0,0,W,H);

    drops.forEach(d => {
        bgCtx.font = "bold " + d.size + "px Arial";
        bgCtx.shadowBlur = 0; 
        
        // Малюємо шлейф (від прозорого до яскравого)
        for(let j = trailCount; j >= 0; j--) {
            // Розраховуємо прозорість: чим далі від оригіналу (j більший), тим прозоріше
            let alpha = 1 - (j / trailCount); 
            if(alpha <= 0) continue;

            // 255, 110, 199 - це RGB код рожевого кольору #ff6ec7
            bgCtx.fillStyle = `rgba(255, 110, 199, ${alpha})`;
            
            // Розраховуємо позицію копії: вона летить вище за оригінал
            // Відстань між копіями залежить від розміру шрифту (d.size * 1.5)
            let ghostY = d.y - (j * d.size * 1.5); 
            
            bgCtx.fillText(d.text, d.x, ghostY);
        }

        d.y += d.speed;

        // Перевіряємо, чи зникло найвище слово шлейфу за екран
        let topGhostY = d.y - (trailCount * d.size * 1.5);

        if(topGhostY > H){
            if(stage === 2) {
                // Ховаємо слова під час переходу
            } else {
                d.y = -50; // Піднімаємо слово ще вище, щоб шлейф не з'являвся різко
                d.x = Math.random() * W;
            }
        }
    });

    if (stage === 3) {
        drawHeart();
    }

    time += 0.03;

    if(elapsed < 12000) {
        requestAnimationFrame(animate);
    }
}

animate();

// ===== ПЕРЕХІД НА САЙТ =====
setTimeout(() => {
    bgCanvas.style.display = "none";
    canvas.style.display = "none";
    
    const mainDiv = document.getElementById("main");
    mainDiv.style.display = "block";
    
    mainDiv.style.opacity = 0;
    let op = 0;
    let fadeInterval = setInterval(() => {
        if(op >= 1) clearInterval(fadeInterval);
        mainDiv.style.opacity = op;
        op += 0.05;
    }, 50);

    document.body.style.overflow = "auto";
}, 12000);
</script>

</body>
</html>
